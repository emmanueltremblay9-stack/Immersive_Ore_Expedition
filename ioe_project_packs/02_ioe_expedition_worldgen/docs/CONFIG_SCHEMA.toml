[global]
randomOreDensityMultiplier = 0.03
requireStructureAnchorForMajorOreLoads = true
allowTinyScrapOreOutsideProvinces = true

naturalExpeditionSiteGenerationEnabled = true

# Site-quality chances are owned by ioe_core SiteQualityRoll defaults.

[anchorRules]
oreLoadMinDistanceFromAnchor = 16
oreLoadMaxDistanceFromAnchor = 96
requireTunnelConnection = true

[structures]
tinyVerticalMineEntrance = true
collapsedShaft = true
minerCamp = true
buriedSurveyMarker = true
basicMineshaftConnector = true
oreLoadChamber = true
