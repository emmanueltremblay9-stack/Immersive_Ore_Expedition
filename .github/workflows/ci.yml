name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consolidated-neoforge-module:
    name: Consolidated NeoForge module
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ioe_project_packs/immersive_ore_expedition

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Clean
        run: gradle --no-daemon clean

      - name: Test
        run: gradle --no-daemon test

      - name: Test installer helpers
        shell: pwsh
        run: ./install-mod.ps1 -TestVersionRanges

      - name: Validate expedition worldgen assets
        run: |
          python3 scripts/validate_worldgen_assets.py
          python3 scripts/analyze_distribution_seeds.py

      - name: Run expedition worldgen GameTests
        run: gradle --no-daemon runGameTestServer

      - name: Stage pinned biome and integration runtime
        run: python3 scripts/stage_ci_runtime_mods.py

      - name: Run expedition worldgen GameTests with complete pinned runtime
        run: gradle --no-daemon -PioeIncludeIeRuntime=true runFullRuntimeGameTestServer

      - name: Inspect runtime multi-seed biome frequency
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import sys

          report_path = Path("build/reports/ioe/multi-seed-biome-frequency.json")
          if not report_path.is_file():
              raise SystemExit(f"Missing full-runtime multi-seed report: {report_path}")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected_profiles = {
              "diamond", "emerald", "certus", "entroized_fluix", "redstone",
              "gold", "uranium", "silver", "lapis", "copper", "aluminum",
              "coal", "nickel", "lead", "iron", "aquatic/alluvial_sift",
              "aquatic/silt", "aquatic/ancient_seabed", "generic",
          }
          counts = report.get("aggregate_profile_samples", {})
          failures = []
          if report.get("classification") != "CONFIRMED_RUNTIME":
              failures.append("classification is not CONFIRMED_RUNTIME")
          if report.get("terrablender_initialized_per_seed") is not True:
              failures.append("TerraBlender was not confirmed initialized independently per seed")
          if len(report.get("seeds", [])) != 10:
              failures.append("the report does not contain exactly 10 seeds")
          if set(counts) != expected_profiles:
              failures.append(
                  f"profile keys differ: missing={sorted(expected_profiles - set(counts))}, "
                  f"extra={sorted(set(counts) - expected_profiles)}"
              )
          missing_observations = sorted(
              profile for profile in expected_profiles if counts.get(profile, 0) <= 0
          )
          if missing_observations:
              failures.append(f"profiles with zero runtime observations: {missing_observations}")
          if sum(counts.values()) != 192000:
              failures.append(f"expected 192000 samples, found {sum(counts.values())}")
          if report.get("distinct_biomes_observed", 0) < 50:
              failures.append("fewer than 50 distinct runtime biomes were observed")
          if failures:
              print("Runtime multi-seed inspection failed:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print(
              "Runtime multi-seed inspection passed: "
              f"{len(report['seeds'])} seeds, {sum(counts.values())} samples, "
              f"{report['distinct_biomes_observed']} biomes"
          )
          PY

      - name: Process resources
        run: gradle --no-daemon processResources

      - name: Jar
        run: gradle --no-daemon jar

      - name: Build
        run: gradle --no-daemon build

      - name: Inspect resolved crystal dependencies
        run: |
          python3 <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import re
          import sys
          import zipfile

          cache_root = Path.home() / ".gradle" / "caches" / "modules-2" / "files-2.1"
          dependency_coordinates = {
              "ae2": ("org.appliedenergistics", "appliedenergistics2", "19.2.17"),
              "ae2cs": ("maven.modrinth", "uJ9afomy", "PP2uuQ6t"),
              "geore": ("maven.modrinth", "Xw6zG9hl", "OV3DOSul"),
          }
          excluded_name_parts = ("sources", "javadoc", "dev", "plain", "test", "api")
          failures = []
          resolved_jars = {}

          def metadata_mod_ids(path):
              try:
                  with zipfile.ZipFile(path) as jar:
                      metadata_path = "META-INF/neoforge.mods.toml"
                      if metadata_path not in jar.namelist():
                          return set()
                      metadata = jar.read(metadata_path).decode("utf-8")
              except (OSError, zipfile.BadZipFile, UnicodeDecodeError):
                  return set()
              return set(re.findall(r'(?m)^\s*modId\s*=\s*"([^"]+)"', metadata))

          def sha256(path):
              digest = hashlib.sha256()
              with path.open("rb") as source:
                  for chunk in iter(lambda: source.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          for mod_id, (group, artifact, version) in dependency_coordinates.items():
              coordinate_root = cache_root / group / artifact / version
              candidates = [
                  path for path in sorted(coordinate_root.rglob("*.jar"))
                  if not any(part in path.name.lower() for part in excluded_name_parts)
              ]
              matching_candidates = [
                  path for path in candidates if mod_id in metadata_mod_ids(path)
              ]
              matching_by_hash = {}
              for path in matching_candidates:
                  matching_by_hash.setdefault(sha256(path), path)
              if len(matching_by_hash) != 1:
                  failures.append(
                      f"Expected one distinct resolved {mod_id} runtime jar under "
                      f"{coordinate_root}, found "
                      f"{[(digest, str(path)) for digest, path in matching_by_hash.items()]}"
                  )
                  continue
              resolved_jars[mod_id] = next(iter(matching_by_hash.values()))

          if failures:
              print("Resolved crystal dependency inspection failed:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          required_growth_hearts = {
              "geore:budding_aluminum",
              "geore:budding_coal",
              "geore:budding_copper",
              "geore:budding_diamond",
              "geore:budding_emerald",
              "geore:budding_gold",
              "geore:budding_iron",
              "geore:budding_lapis",
              "geore:budding_lead",
              "geore:budding_nickel",
              "geore:budding_redstone",
              "geore:budding_silver",
              "geore:budding_uranium",
          }

          ioe_growth_overlay_path = Path(
              "src/main/resources/data/ae2/tags/block/growth_acceleratable.json"
          )
          if not ioe_growth_overlay_path.is_file():
              failures.append(
                  f"IOE growth overlay is missing: {ioe_growth_overlay_path}"
              )
          else:
              ioe_growth_overlay = json.loads(
                  ioe_growth_overlay_path.read_text(encoding="utf-8")
              )
              ioe_growth_values = {
                  value if isinstance(value, str) else value.get("id")
                  for value in ioe_growth_overlay.get("values", [])
              }
              missing_ioe_growth_hearts = sorted(
                  required_growth_hearts - ioe_growth_values
              )
              if ioe_growth_overlay.get("replace") is not False:
                  failures.append(
                      "IOE growth_acceleratable overlay must merge with replace=false"
                  )
              if missing_ioe_growth_hearts:
                  failures.append(
                      f"IOE growth overlay does not connect AE2 to GeOre hearts: "
                      f"{missing_ioe_growth_hearts}"
                  )

          ae2_path = resolved_jars["ae2"]
          with zipfile.ZipFile(ae2_path) as ae2:
              ae2_entries = set(ae2.namelist())
              growth_accelerator_class = (
                  "appeng/blockentity/misc/GrowthAcceleratorBlockEntity.class"
              )
              ae_tags_class = "appeng/api/ids/AETags.class"
              ae2_growth_tag_path = "data/ae2/tags/block/growth_acceleratable.json"
              required_ae2_entries = {
                  growth_accelerator_class,
                  ae_tags_class,
                  ae2_growth_tag_path,
                  "data/ae2/recipe/transform/damaged_budding_quartz.json",
                  "data/ae2/recipe/transform/chipped_budding_quartz.json",
                  "data/ae2/recipe/transform/flawed_budding_quartz.json",
              }
              missing_ae2_entries = sorted(required_ae2_entries - ae2_entries)
              if missing_ae2_entries:
                  failures.append(
                      f"AE2 19.2.17 jar is missing required growth/repair entries: "
                      f"{missing_ae2_entries}"
                  )
              else:
                  if b"GROWTH_ACCELERATABLE" not in ae2.read(growth_accelerator_class):
                      failures.append(
                          "AE2 GrowthAcceleratorBlockEntity does not reference "
                          "AETags.GROWTH_ACCELERATABLE"
                      )
                  if b"growth_acceleratable" not in ae2.read(ae_tags_class):
                      failures.append("AE2 AETags does not define growth_acceleratable")

                  ae2_growth_tag = json.loads(
                      ae2.read(ae2_growth_tag_path).decode("utf-8")
                  )
                  ae2_growth_values = {
                      value if isinstance(value, str) else value.get("id")
                      for value in ae2_growth_tag.get("values", [])
                  }
                  if "#c:budding_blocks" not in ae2_growth_values:
                      failures.append(
                          "AE2 growth_acceleratable no longer includes the common budding tag"
                      )

                  expected_repairs = {
                      "damaged_budding_quartz": (
                          {"ae2:charged_certus_quartz_crystal", "ae2:quartz_block"},
                          "ae2:damaged_budding_quartz",
                      ),
                      "chipped_budding_quartz": (
                          {
                              "ae2:charged_certus_quartz_crystal",
                              "ae2:damaged_budding_quartz",
                          },
                          "ae2:chipped_budding_quartz",
                      ),
                      "flawed_budding_quartz": (
                          {
                              "ae2:charged_certus_quartz_crystal",
                              "ae2:chipped_budding_quartz",
                          },
                          "ae2:flawed_budding_quartz",
                      ),
                  }
                  for recipe_name, (expected_ingredients, expected_result) in expected_repairs.items():
                      recipe_path = f"data/ae2/recipe/transform/{recipe_name}.json"
                      recipe = json.loads(ae2.read(recipe_path).decode("utf-8"))
                      actual_ingredients = {
                          ingredient.get("item")
                          for ingredient in recipe.get("ingredients", [])
                          if isinstance(ingredient, dict)
                      }
                      actual_result = recipe.get("result", {}).get("id")
                      if actual_ingredients != expected_ingredients or actual_result != expected_result:
                          failures.append(
                              f"AE2 repair recipe {recipe_name!r} changed: "
                              f"ingredients={actual_ingredients}, result={actual_result!r}"
                          )

          ae2cs_path = resolved_jars["ae2cs"]
          with zipfile.ZipFile(ae2cs_path) as ae2cs:
              ae2cs_entries = set(ae2cs.namelist())
              ae2cs_modifier_path = (
                  "data/ae2cs/neoforge/biome_modifier/add_certus_quartz_ores.json"
              )
              required_ae2cs_features = {
                  "ae2cs:certus_quartz_ore_placed",
                  "ae2cs:charged_certus_quartz_ore_placed",
              }
              required_ae2cs_worldgen_entries = {
                  ae2cs_modifier_path,
                  "data/ae2cs/worldgen/placed_feature/certus_quartz_ore_placed.json",
                  "data/ae2cs/worldgen/placed_feature/charged_certus_quartz_ore_placed.json",
              }
              required_ae2cs_authority_entries = {
                  "io/github/lounode/ae2cs/common/init/AECSBlocks.class",
                  "io/github/lounode/ae2cs/common/init/AECSItems.class",
                  "io/github/lounode/ae2cs/common/init/AECSRecipeTypes.class",
                  "io/github/lounode/ae2cs/common/item/CrystalSeedItem.class",
                  "io/github/lounode/ae2cs/common/item/PureCrystalItem.class",
                  "io/github/lounode/ae2cs/common/me/AEPlugin.class",
              }
              missing_ae2cs_worldgen_entries = sorted(
                  required_ae2cs_worldgen_entries - ae2cs_entries
              )
              missing_ae2cs_authority_entries = sorted(
                  required_ae2cs_authority_entries - ae2cs_entries
              )
              if missing_ae2cs_worldgen_entries:
                  failures.append(
                      f"AE2CS 1.1.12 jar is missing expected Certus ore worldgen: "
                      f"{missing_ae2cs_worldgen_entries}"
                  )
              else:
                  ae2cs_modifier = json.loads(
                      ae2cs.read(ae2cs_modifier_path).decode("utf-8")
                  )
                  actual_features = ae2cs_modifier.get("features", [])
                  if isinstance(actual_features, str):
                      actual_features = [actual_features]
                  if set(actual_features) != required_ae2cs_features:
                      failures.append(
                          f"AE2CS Certus biome modifier features changed: {actual_features}"
                      )
                  if ae2cs_modifier.get("step") != "underground_ores":
                      failures.append(
                          "AE2CS Certus biome modifier no longer uses underground_ores"
                      )
              if missing_ae2cs_authority_entries:
                  failures.append(
                      "AE2CS 1.1.12 jar no longer provides the expected purification "
                      f"and crystal-automation implementation classes: "
                      f"{missing_ae2cs_authority_entries}"
                  )
              else:
                  authority_symbols = {
                      "io/github/lounode/ae2cs/common/init/AECSBlocks.class": (
                          b"GROWTH_CHAMBER",
                          b"CRYSTAL_AGGREGATOR",
                      ),
                      "io/github/lounode/ae2cs/common/init/AECSItems.class": (
                          b"PURE_CERTUS_QUARTZ_CRYSTAL",
                          b"CERTUS_QUARTZ_SEED",
                      ),
                  }
                  for class_path, expected_symbols in authority_symbols.items():
                      class_bytes = ae2cs.read(class_path)
                      missing_symbols = [
                          symbol.decode("ascii")
                          for symbol in expected_symbols
                          if symbol not in class_bytes
                      ]
                      if missing_symbols:
                          failures.append(
                              f"AE2CS authority class {class_path} is missing expected "
                              f"symbols: {missing_symbols}"
                          )

          geore_path = resolved_jars["geore"]
          with zipfile.ZipFile(geore_path) as geore:
              geore_tag_path = "data/geore/tags/block/budding_geore.json"
              if geore_tag_path not in geore.namelist():
                  failures.append("GeOre 6.2.2 jar is missing budding_geore block tag")
              else:
                  geore_tag = json.loads(geore.read(geore_tag_path).decode("utf-8"))
                  geore_values = {
                      value if isinstance(value, str) else value.get("id")
                      for value in geore_tag.get("values", [])
                  }
                  missing_geore_hearts = sorted(required_growth_hearts - geore_values)
                  if missing_geore_hearts:
                      failures.append(
                          f"GeOre 6.2.2 does not provide required budding hearts: "
                          f"{missing_geore_hearts}"
                      )

          if failures:
              print("Resolved crystal dependency inspection failed:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("Resolved crystal dependency inspection passed.")
          for mod_id, path in resolved_jars.items():
              print(f"{mod_id}: {path}")
          PY

      - name: Inspect consolidated jar
        run: |
          python3 <<'PY'
          from collections import Counter
          from pathlib import Path
          import json
          import re
          import sys
          import zipfile

          expected_mod_id = "immersive_ore_expedition"
          old_mod_ids = {
              "ioe_core",
              "ioe_expedition_worldgen",
              "ioe_crystal_growth",
              "ioe_nether_geodes",
              "ioe_ieip_prospecting",
              "ioe_retrogen_admin",
          }

          build_libs = Path("build/libs")
          excluded_name_parts = ("sources", "javadoc", "dev", "plain", "test", "api")
          candidates = [
              path for path in sorted(build_libs.glob("*.jar"))
              if not any(part in path.name.lower() for part in excluded_name_parts)
          ]

          if len(candidates) != 1:
              print("Expected exactly one runtime jar candidate in build/libs.")
              print("Candidates:", [path.name for path in candidates])
              sys.exit(1)

          jar_path = candidates[0]
          with zipfile.ZipFile(jar_path) as jar:
              entries = jar.namelist()
              counts = Counter(entries)
              duplicates = sorted(name for name, count in counts.items() if count > 1)
              neoforge_metadata = [name for name in entries if name == "META-INF/neoforge.mods.toml"]
              pack_metadata = [name for name in entries if name == "pack.mcmeta"]
              embedded_jars = sorted(name for name in entries if name.lower().endswith(".jar"))
              compiled_mod_classes = sorted(
                  name for name in entries
                  if name.startswith("com/oblixorprime/ioe/") and name.endswith(".class")
              )
              expedition_feature_ids = (
                  "tiny_vertical_mine_entrance",
                  "collapsed_shaft",
                  "miner_camp",
                  "buried_survey_marker",
                  "basic_mineshaft_connector",
                  "ore_load_chamber",
              )
              missing_worldgen_resources = []
              for feature_id in expedition_feature_ids:
                  for category in ("configured_feature", "placed_feature"):
                      expected_entry = (
                          f"data/{expected_mod_id}/worldgen/{category}/{feature_id}.json"
                      )
                      if expected_entry not in entries:
                          missing_worldgen_resources.append(expected_entry)
              expected_game_test_template = (
                  f"data/{expected_mod_id}/structure/expedition_worldgen_empty.nbt"
              )
              if expected_game_test_template not in entries:
                  missing_worldgen_resources.append(expected_game_test_template)

              crystal_integration_resources = {
                  "growth_tag": "data/ae2/tags/block/growth_acceleratable.json",
                  "meteorite_biome_tag": "data/ae2/tags/worldgen/biome/has_meteorites.json",
                  "ore_replacement_modifier": (
                      f"data/{expected_mod_id}/neoforge/biome_modifier/replace_normal_ores_with_nodes.json"
                  ),
                  "resource_suppression_biomes": (
                      f"data/{expected_mod_id}/tags/worldgen/biome/resource_suppression_biomes.json"
                  ),
                  "normal_ore_tag": (
                      f"data/{expected_mod_id}/tags/worldgen/placed_feature/normal_ore_generation.json"
                  ),
              }
              missing_crystal_resources = sorted(
                  path for path in crystal_integration_resources.values() if path not in entries
              )
              distribution_resources = {
                  "aquatic_alluvial": "data/immersiveengineering/recipe/mineral/alluvial_sift.json",
                  "aquatic_silt": "data/immersiveengineering/recipe/mineral/silt.json",
                  "aquatic_ancient_seabed": "data/immersiveengineering/recipe/mineral/ancient_seabed.json",
                  "iron_mix": f"data/{expected_mod_id}/recipe/mineral/iron.json",
                  "certus_mix": f"data/{expected_mod_id}/recipe/mineral/certus.json",
                  "entro_mix": f"data/{expected_mod_id}/recipe/mineral/entroized_fluix.json",
              }
              missing_distribution_resources = sorted(
                  path for path in distribution_resources.values() if path not in entries
              )

              failures = []
              if duplicates:
                  failures.append(f"Duplicate jar entries found: {duplicates}")
              if len(neoforge_metadata) != 1:
                  failures.append(f"Expected exactly one META-INF/neoforge.mods.toml, found {len(neoforge_metadata)}")
              if len(pack_metadata) != 1:
                  failures.append(f"Expected exactly one pack.mcmeta, found {len(pack_metadata)}")
              if not compiled_mod_classes:
                  failures.append("No compiled classes found under com/oblixorprime/ioe/; jar may be empty or resource-only")
              if embedded_jars:
                  failures.append(f"Embedded jar files found: {embedded_jars}")
              if missing_worldgen_resources:
                  failures.append(
                      f"Missing expedition worldgen resources: {missing_worldgen_resources}"
                  )
              if missing_crystal_resources:
                  failures.append(
                      f"Missing AE2 crystal integration resources: {missing_crystal_resources}"
                  )
              if missing_distribution_resources:
                  failures.append(
                      f"Missing biome-mineral distribution resources: {missing_distribution_resources}"
                  )

              if neoforge_metadata:
                  metadata_text = jar.read(neoforge_metadata[0]).decode("utf-8")
                  mod_blocks = re.findall(r"(?ms)^\s*\[\[mods\]\]\s*(.*?)(?=^\s*\[\[|\Z)", metadata_text)
                  active_mod_ids = []
                  for block in mod_blocks:
                      match = re.search(r'(?m)^\s*modId\s*=\s*"([^"]+)"', block)
                      if match:
                          active_mod_ids.append(match.group(1))

                  if active_mod_ids != [expected_mod_id]:
                      failures.append(f"Expected active mod ids [{expected_mod_id!r}], found {active_mod_ids!r}")

                  old_active_ids = sorted(old_mod_ids.intersection(active_mod_ids))
                  if old_active_ids:
                      failures.append(f"Old IOE mod ids are still active in metadata: {old_active_ids}")

                  dependency_blocks = re.findall(
                      rf"(?ms)^\s*\[\[dependencies\.{re.escape(expected_mod_id)}\]\]\s*"
                      r"(.*?)(?=^\s*\[\[|\Z)",
                      metadata_text,
                  )
                  dependency_types = {}
                  dependency_ranges = {}
                  for block in dependency_blocks:
                      id_match = re.search(r'(?m)^\s*modId\s*=\s*"([^"]+)"', block)
                      type_match = re.search(r'(?m)^\s*type\s*=\s*"([^"]+)"', block)
                      range_match = re.search(r'(?m)^\s*versionRange\s*=\s*"([^"]+)"', block)
                      if id_match and type_match:
                          dependency_types[id_match.group(1)] = type_match.group(1)
                      if id_match and range_match:
                          dependency_ranges[id_match.group(1)] = range_match.group(1)

                  for required_dependency in ("ae2", "ae2cs", "geore"):
                      actual_type = dependency_types.get(required_dependency)
                      if actual_type != "required":
                          failures.append(
                              f"Dependency {required_dependency!r} must be required, found {actual_type!r}"
                          )

                  expected_dependency_ranges = {
                      "ae2": "[19.2.17,20)",
                      "ae2cs": "[1.1.12,1.2)",
                      "geore": "[6.2.2,7)",
                      "immersivepetroleum": "[4.4.1-37],[4.5.0-39]",
                  }
                  for dependency_id, expected_range in expected_dependency_ranges.items():
                      actual_range = dependency_ranges.get(dependency_id)
                      if actual_range != expected_range:
                          failures.append(
                              f"Dependency {dependency_id!r} must use {expected_range!r}, found {actual_range!r}"
                          )

              active_feature_class = (
                  "com/oblixorprime/ioe/worldgen/ExpeditionSiteFeature.class"
              )
              if active_feature_class not in entries:
                  failures.append(f"Missing active expedition feature class: {active_feature_class}")
              else:
                  feature_bytes = jar.read(active_feature_class)
                  for forbidden_bridge in (
                      b"GeOreNodeIntegration",
                      b"Ae2MeteoriteIntegration",
                      b"ExtendedAeGeodeIntegration",
                  ):
                      if forbidden_bridge in feature_bytes:
                          failures.append(
                              "Active expedition feature still references an artificial "
                              f"resource bridge: {forbidden_bridge.decode('ascii')}"
                          )
                  if b"IoeMotherDepositReservation" not in feature_bytes:
                      failures.append(
                          "Active expedition feature does not reference the abstract IE deposit path"
                      )

              if not missing_crystal_resources:
                  growth_tag = json.loads(
                      jar.read(crystal_integration_resources["growth_tag"]).decode("utf-8")
                  )
                  growth_values = {
                      value if isinstance(value, str) else value.get("id")
                      for value in growth_tag.get("values", [])
                  }
                  required_growth_hearts = {
                      "geore:budding_aluminum",
                      "geore:budding_coal",
                      "geore:budding_copper",
                      "geore:budding_diamond",
                      "geore:budding_emerald",
                      "geore:budding_gold",
                      "geore:budding_iron",
                      "geore:budding_lapis",
                      "geore:budding_lead",
                      "geore:budding_nickel",
                      "geore:budding_redstone",
                      "geore:budding_silver",
                      "geore:budding_uranium",
                  }
                  missing_growth_hearts = sorted(required_growth_hearts - growth_values)
                  if growth_tag.get("replace") is not False:
                      failures.append("AE2 growth_acceleratable extension must merge with replace=false")
                  if missing_growth_hearts:
                      failures.append(
                          f"AE2 growth tag is missing required GeOre hearts: {missing_growth_hearts}"
                      )

                  meteorite_tag = json.loads(
                      jar.read(crystal_integration_resources["meteorite_biome_tag"]).decode("utf-8")
                  )
                  if meteorite_tag.get("replace") is not False or meteorite_tag.get("values") != []:
                      failures.append(
                          "AE2 meteorite overlay must merge with replace=false and preserve upstream values"
                      )

                  normal_ore_tag = json.loads(
                      jar.read(crystal_integration_resources["normal_ore_tag"]).decode("utf-8")
                  )
                  normal_ore_values = {
                      value if isinstance(value, str) else value.get("id")
                      for value in normal_ore_tag.get("values", [])
                  }
                  required_ae2cs_ores = {
                      "ae2cs:certus_quartz_ore_placed",
                      "ae2cs:charged_certus_quartz_ore_placed",
                  }
                  missing_ae2cs_ores = sorted(required_ae2cs_ores - normal_ore_values)
                  if missing_ae2cs_ores:
                      failures.append(
                          f"Normal ore suppression tag is missing AE2CS ores: {missing_ae2cs_ores}"
                      )

                  ore_replacement_modifier = json.loads(
                      jar.read(
                          crystal_integration_resources["ore_replacement_modifier"]
                      ).decode("utf-8")
                  )
                  expected_modifier_fields = {
                      "type": f"{expected_mod_id}:replace_normal_ores_with_nodes",
                      "biomes": f"#{expected_mod_id}:resource_suppression_biomes",
                      "features": f"#{expected_mod_id}:normal_ore_generation",
                  }
                  for field, expected_value in expected_modifier_fields.items():
                      actual_value = ore_replacement_modifier.get(field)
                      if actual_value != expected_value:
                          failures.append(
                              f"Ore replacement modifier field {field!r} must be "
                              f"{expected_value!r}, found {actual_value!r}"
                          )

                  resource_suppression_biomes = json.loads(
                      jar.read(
                          crystal_integration_resources["resource_suppression_biomes"]
                      ).decode("utf-8")
                  )
                  required_dimension_biome_tags = {
                      "#c:is_overworld",
                      "#c:is_nether",
                      "#c:is_end",
                  }
                  actual_dimension_biome_tags = set(
                      resource_suppression_biomes.get("values", [])
                  )
                  if actual_dimension_biome_tags != required_dimension_biome_tags:
                      failures.append(
                          "Ore replacement modifier must cover Overworld, Nether, and End; "
                          f"found {sorted(actual_dimension_biome_tags)}"
                      )

                  required_generation_steps = {
                      "raw_generation",
                      "lakes",
                      "local_modifications",
                      "underground_structures",
                      "surface_structures",
                      "strongholds",
                      "underground_ores",
                      "underground_decoration",
                      "fluid_springs",
                      "vegetal_decoration",
                      "top_layer_modification",
                  }
                  actual_generation_steps = set(ore_replacement_modifier.get("steps", []))
                  missing_generation_steps = sorted(
                      required_generation_steps - actual_generation_steps
                  )
                  if missing_generation_steps:
                      failures.append(
                          f"Ore replacement modifier is missing generation steps: "
                          f"{missing_generation_steps}"
                      )

              if failures:
                  print(f"Jar inspection failed for {jar_path}:")
                  for failure in failures:
                      print(f"- {failure}")
                  sys.exit(1)

              print(f"Jar inspection passed: {jar_path}")
              print(f"Active mod id: {expected_mod_id}")
              print(f"Compiled IOE class count: {len(compiled_mod_classes)}")
              print("No embedded jars or duplicate entries found.")
          PY

      - name: Upload final jar
        uses: actions/upload-artifact@v4
        with:
          name: immersive-ore-expedition-neoforge-1.21.1
          path: ioe_project_packs/immersive_ore_expedition/build/libs/immersive_ore_expedition-*-neoforge-1.21.1.jar
          if-no-files-found: error

      - name: Upload test and build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immersive-ore-expedition-build-reports
          path: |
            ioe_project_packs/immersive_ore_expedition/build/reports/**
            ioe_project_packs/immersive_ore_expedition/build/test-results/**
            ioe_project_packs/immersive_ore_expedition/run/gametest-full/runtime-mods-evidence.json
            ioe_project_packs/immersive_ore_expedition/docs/biome_mineral_distribution/**
          if-no-files-found: ignore

  legacy-split-modules:
    name: Legacy split module (${{ matrix.module.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - name: ioe_core
            path: ioe_project_packs/01_ioe_core
          - name: ioe_expedition_worldgen
            path: ioe_project_packs/02_ioe_expedition_worldgen
          - name: ioe_crystal_growth
            path: ioe_project_packs/03_ioe_crystal_growth
          - name: ioe_nether_geodes
            path: ioe_project_packs/04_ioe_nether_geodes
          - name: ioe_ieip_prospecting
            path: ioe_project_packs/05_ioe_ieip_prospecting
          - name: ioe_retrogen_admin
            path: ioe_project_packs/06_ioe_retrogen_admin

    defaults:
      run:
        working-directory: ${{ matrix.module.path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Test and jar
        run: gradle --no-daemon clean test jar

      - name: Inspect legacy module jar
        run: |
          python3 <<'PY'
          from pathlib import Path
          import sys
          import zipfile

          properties = {}
          for line in Path("gradle.properties").read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              properties[key.strip()] = value.strip()

          expected_mod_id = properties.get("mod_id")
          build_libs = Path("build/libs")
          excluded_name_parts = ("sources", "javadoc", "dev", "plain", "test", "api")
          candidates = [
              path for path in sorted(build_libs.glob("*.jar"))
              if not any(part in path.name.lower() for part in excluded_name_parts)
          ]

          if len(candidates) != 1:
              print("Expected exactly one runtime jar candidate in build/libs.")
              print("Candidates:", [path.name for path in candidates])
              sys.exit(1)

          jar_path = candidates[0]
          with zipfile.ZipFile(jar_path) as jar:
              entries = jar.namelist()
              class_entries = [name for name in entries if name.endswith(".class")]
              has_metadata = "META-INF/neoforge.mods.toml" in entries

              failures = []
              if not class_entries:
                  failures.append("runtime jar contains no compiled class entries")
              if not has_metadata:
                  failures.append("runtime jar is missing META-INF/neoforge.mods.toml")
              if expected_mod_id and expected_mod_id not in jar.read("META-INF/neoforge.mods.toml").decode("utf-8"):
                  failures.append(f"metadata does not mention expected mod id {expected_mod_id!r}")

              if failures:
                  print(f"Jar inspection failed for {jar_path}:")
                  for failure in failures:
                      print(f"- {failure}")
                  sys.exit(1)

              print(f"Jar inspection passed: {jar_path}")
              print(f"Class entries: {len(class_entries)}")
          PY

      - name: Upload legacy module reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-${{ matrix.module.name }}-reports
          path: |
            ${{ matrix.module.path }}/build/reports/**
            ${{ matrix.module.path }}/build/test-results/**
          if-no-files-found: ignore
