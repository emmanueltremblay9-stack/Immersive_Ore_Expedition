name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consolidated-neoforge-module:
    name: Consolidated NeoForge module
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ioe_project_packs/immersive_ore_expedition

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Clean
        run: gradle --no-daemon clean

      - name: Test
        run: gradle --no-daemon test

      - name: Validate expedition worldgen assets
        run: python3 scripts/validate_worldgen_assets.py

      - name: Run expedition worldgen GameTests
        run: gradle --no-daemon runGameTestServer

      - name: Process resources
        run: gradle --no-daemon processResources

      - name: Jar
        run: gradle --no-daemon jar

      - name: Build
        run: gradle --no-daemon build

      - name: Inspect consolidated jar
        run: |
          python3 <<'PY'
          from collections import Counter
          from pathlib import Path
          import re
          import sys
          import zipfile

          expected_mod_id = "immersive_ore_expedition"
          old_mod_ids = {
              "ioe_core",
              "ioe_expedition_worldgen",
              "ioe_crystal_growth",
              "ioe_nether_geodes",
              "ioe_ieip_prospecting",
              "ioe_retrogen_admin",
          }

          build_libs = Path("build/libs")
          excluded_name_parts = ("sources", "javadoc", "dev", "plain", "test", "api")
          candidates = [
              path for path in sorted(build_libs.glob("*.jar"))
              if not any(part in path.name.lower() for part in excluded_name_parts)
          ]

          if len(candidates) != 1:
              print("Expected exactly one runtime jar candidate in build/libs.")
              print("Candidates:", [path.name for path in candidates])
              sys.exit(1)

          jar_path = candidates[0]
          with zipfile.ZipFile(jar_path) as jar:
              entries = jar.namelist()
              counts = Counter(entries)
              duplicates = sorted(name for name, count in counts.items() if count > 1)
              neoforge_metadata = [name for name in entries if name == "META-INF/neoforge.mods.toml"]
              pack_metadata = [name for name in entries if name == "pack.mcmeta"]
              embedded_jars = sorted(name for name in entries if name.lower().endswith(".jar"))
              compiled_mod_classes = sorted(
                  name for name in entries
                  if name.startswith("com/oblixorprime/ioe/") and name.endswith(".class")
              )
              expedition_feature_ids = (
                  "tiny_vertical_mine_entrance",
                  "collapsed_shaft",
                  "miner_camp",
                  "buried_survey_marker",
                  "basic_mineshaft_connector",
                  "ore_load_chamber",
              )
              missing_worldgen_resources = []
              for feature_id in expedition_feature_ids:
                  for category in ("configured_feature", "placed_feature"):
                      expected_entry = (
                          f"data/{expected_mod_id}/worldgen/{category}/{feature_id}.json"
                      )
                      if expected_entry not in entries:
                          missing_worldgen_resources.append(expected_entry)
              expected_game_test_template = (
                  f"data/{expected_mod_id}/structure/expedition_worldgen_empty.nbt"
              )
              if expected_game_test_template not in entries:
                  missing_worldgen_resources.append(expected_game_test_template)

              failures = []
              if duplicates:
                  failures.append(f"Duplicate jar entries found: {duplicates}")
              if len(neoforge_metadata) != 1:
                  failures.append(f"Expected exactly one META-INF/neoforge.mods.toml, found {len(neoforge_metadata)}")
              if len(pack_metadata) != 1:
                  failures.append(f"Expected exactly one pack.mcmeta, found {len(pack_metadata)}")
              if not compiled_mod_classes:
                  failures.append("No compiled classes found under com/oblixorprime/ioe/; jar may be empty or resource-only")
              if embedded_jars:
                  failures.append(f"Embedded jar files found: {embedded_jars}")
              if missing_worldgen_resources:
                  failures.append(
                      f"Missing expedition worldgen resources: {missing_worldgen_resources}"
                  )

              if neoforge_metadata:
                  metadata_text = jar.read(neoforge_metadata[0]).decode("utf-8")
                  mod_blocks = re.findall(r"(?ms)^\s*\[\[mods\]\]\s*(.*?)(?=^\s*\[\[|\Z)", metadata_text)
                  active_mod_ids = []
                  for block in mod_blocks:
                      match = re.search(r'(?m)^\s*modId\s*=\s*"([^"]+)"', block)
                      if match:
                          active_mod_ids.append(match.group(1))

                  if active_mod_ids != [expected_mod_id]:
                      failures.append(f"Expected active mod ids [{expected_mod_id!r}], found {active_mod_ids!r}")

                  old_active_ids = sorted(old_mod_ids.intersection(active_mod_ids))
                  if old_active_ids:
                      failures.append(f"Old IOE mod ids are still active in metadata: {old_active_ids}")

              if failures:
                  print(f"Jar inspection failed for {jar_path}:")
                  for failure in failures:
                      print(f"- {failure}")
                  sys.exit(1)

              print(f"Jar inspection passed: {jar_path}")
              print(f"Active mod id: {expected_mod_id}")
              print(f"Compiled IOE class count: {len(compiled_mod_classes)}")
              print("No embedded jars or duplicate entries found.")
          PY

      - name: Upload final jar
        uses: actions/upload-artifact@v4
        with:
          name: immersive-ore-expedition-neoforge-1.21.1
          path: ioe_project_packs/immersive_ore_expedition/build/libs/immersive_ore_expedition-*-neoforge-1.21.1.jar
          if-no-files-found: error

      - name: Upload test and build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immersive-ore-expedition-build-reports
          path: |
            ioe_project_packs/immersive_ore_expedition/build/reports/**
            ioe_project_packs/immersive_ore_expedition/build/test-results/**
          if-no-files-found: ignore

  legacy-split-modules:
    name: Legacy split module (${{ matrix.module.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - name: ioe_core
            path: ioe_project_packs/01_ioe_core
          - name: ioe_expedition_worldgen
            path: ioe_project_packs/02_ioe_expedition_worldgen
          - name: ioe_crystal_growth
            path: ioe_project_packs/03_ioe_crystal_growth
          - name: ioe_nether_geodes
            path: ioe_project_packs/04_ioe_nether_geodes
          - name: ioe_ieip_prospecting
            path: ioe_project_packs/05_ioe_ieip_prospecting
          - name: ioe_retrogen_admin
            path: ioe_project_packs/06_ioe_retrogen_admin

    defaults:
      run:
        working-directory: ${{ matrix.module.path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.8"

      - name: Test and jar
        run: gradle --no-daemon clean test jar

      - name: Inspect legacy module jar
        run: |
          python3 <<'PY'
          from pathlib import Path
          import sys
          import zipfile

          properties = {}
          for line in Path("gradle.properties").read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              properties[key.strip()] = value.strip()

          expected_mod_id = properties.get("mod_id")
          build_libs = Path("build/libs")
          excluded_name_parts = ("sources", "javadoc", "dev", "plain", "test", "api")
          candidates = [
              path for path in sorted(build_libs.glob("*.jar"))
              if not any(part in path.name.lower() for part in excluded_name_parts)
          ]

          if len(candidates) != 1:
              print("Expected exactly one runtime jar candidate in build/libs.")
              print("Candidates:", [path.name for path in candidates])
              sys.exit(1)

          jar_path = candidates[0]
          with zipfile.ZipFile(jar_path) as jar:
              entries = jar.namelist()
              class_entries = [name for name in entries if name.endswith(".class")]
              has_metadata = "META-INF/neoforge.mods.toml" in entries

              failures = []
              if not class_entries:
                  failures.append("runtime jar contains no compiled class entries")
              if not has_metadata:
                  failures.append("runtime jar is missing META-INF/neoforge.mods.toml")
              if expected_mod_id and expected_mod_id not in jar.read("META-INF/neoforge.mods.toml").decode("utf-8"):
                  failures.append(f"metadata does not mention expected mod id {expected_mod_id!r}")

              if failures:
                  print(f"Jar inspection failed for {jar_path}:")
                  for failure in failures:
                      print(f"- {failure}")
                  sys.exit(1)

              print(f"Jar inspection passed: {jar_path}")
              print(f"Class entries: {len(class_entries)}")
          PY

      - name: Upload legacy module reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-${{ matrix.module.name }}-reports
          path: |
            ${{ matrix.module.path }}/build/reports/**
            ${{ matrix.module.path }}/build/test-results/**
          if-no-files-found: ignore
